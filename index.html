<title>Quintessa Creative Performance Dashboard &mdash; All Time</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0C0F14;color:#E2E8F0;font-family:'DM Sans',sans-serif;padding:24px 24px 48px}
.wrap{max-width:1700px;margin:0 auto}
h1{font-size:28px;font-weight:700;color:#F8FAFC;text-align:center;margin-bottom:4px}
.subtitle{font-size:14px;color:#94A3B8;text-align:center;margin-bottom:16px}
.legend{display:flex;justify-content:center;gap:24px;font-size:12px;color:#94A3B8;margin-bottom:20px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:6px}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dot-g{background:#34D399}.dot-y{background:#FBBF24}.dot-r{background:#F87171}.dot-gr{background:#475569}
.controls{display:flex;gap:10px;margin-bottom:14px;align-items:center;flex-wrap:wrap}
.search{width:280px;padding:8px 12px;background:#151922;border:1px solid #334155;border-radius:8px;color:#E2E8F0;font-size:13px;font-family:'DM Sans',sans-serif}
.search::placeholder{color:#64748B}
.search:focus{outline:none;border-color:#3B82F6}
.fbtn{padding:6px 14px;border-radius:8px;border:1px solid #334155;background:transparent;color:#94A3B8;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.fbtn:hover{color:#CBD5E1;border-color:#475569}
.fbtn.active{background:#334155;color:#E2E8F0;border-color:#475569}
.tab-bar{display:flex;width:fit-content;background:#151922;border-radius:10px;border:1px solid #1E293B;margin-bottom:16px;overflow:hidden}
.tab{padding:10px 20px;cursor:pointer;color:#64748B;font-size:13px;font-weight:500;border-right:1px solid #1E293B;transition:all .15s;white-space:nowrap;user-select:none}
.tab:last-child{border-right:none}
.tab:hover{color:#CBD5E1}
.tab.active{background:#3B82F6;color:#fff}
.tab .cnt{opacity:.6;font-size:11px}
.tbl-wrap{overflow-x:auto;border-radius:10px;border:1px solid #1E293B;max-height:calc(100vh - 280px);overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{position:sticky;top:0;background:#151922;color:#94A3B8;font-weight:600;padding:10px;text-align:left;border-bottom:1px solid #1E293B;white-space:nowrap;cursor:pointer;user-select:none;z-index:10;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
thead th:hover{color:#CBD5E1}
thead th .arr{font-size:10px;margin-left:3px;opacity:.4}
thead th.sorted .arr{opacity:1;color:#3B82F6}
tbody td{padding:8px 10px;border-bottom:1px solid #1E293B;white-space:nowrap;font-family:'JetBrains Mono',monospace;font-size:11px;color:#CBD5E1}
tbody tr:hover td{background:#1a1f2e}
.col-idx{position:sticky;left:0;z-index:5;background:#0C0F14;min-width:36px;text-align:center;color:#475569;font-size:11px}
.col-name{position:sticky;left:36px;z-index:5;background:#0C0F14;min-width:380px;max-width:440px;overflow:hidden;text-overflow:ellipsis;font-family:'DM Sans',sans-serif;font-weight:500;color:#F8FAFC;font-size:12px}
thead .col-idx{z-index:11;background:#151922}
thead .col-name{z-index:11;background:#151922}
tbody tr:hover .col-idx,tbody tr:hover .col-name{background:#1a1f2e}
.nd{color:#475569}
.wk{background:rgba(52,211,153,.15);color:#34D399;padding:3px 8px;border-radius:6px;font-weight:500}
.of{background:rgba(251,191,36,.15);color:#FBBF24;padding:3px 8px;border-radius:6px;font-weight:500}
.ak{background:rgba(248,113,113,.15);color:#F87171;padding:3px 8px;border-radius:6px;font-weight:500}
.view-link{color:#60A5FA;text-decoration:none;font-family:'DM Sans',sans-serif;font-size:11px;display:inline-flex;align-items:center;gap:3px}
.view-link:hover{color:#93C5FD}
.view-link svg{width:11px;height:11px}
.row-count{text-align:right;color:#475569;font-size:12px;margin-top:8px}
</style>
</head>

const TABS=[
 {key:'statics',label:'Static Ads',isVideo:false},
 {key:'videos',label:'Video Ads',isVideo:true},
 {key:'copy',label:'Copy',isVideo:false}
];
// Cost-per-application: LOWER is better. Hook/Hold: HIGHER is better.
const CPA={green:200,yellow:250};
const KPI={hookRate:{green:20,yellow:15},holdRate:{green:20,yellow:15}};
let curTab=0,sortCol='cost',sortAsc=false,filters={winners:false,spend:false};
function cpaBadge(v){if(v==null)return'nd';return v<=CPA.green?'wk':v<=CPA.yellow?'of':'ak';}
function hiBadge(v,metric){if(v==null)return'nd';const k=KPI[metric];if(!k)return'nd';return v>=k.green?'wk':v>=k.yellow?'of':'ak';}
function fmt$(v){if(v==null)return'<span class="nd">&mdash;</span>';return'$'+v.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtD(v){if(v==null)return'<span class="nd">&mdash;</span>';return'$'+Math.round(v).toLocaleString('en-US')}
function fmtN(v){if(v==null)return'<span class="nd">&mdash;</span>';return Math.round(v).toLocaleString('en-US')}
function fmtP(v){if(v==null)return'<span class="nd">&mdash;</span>';return v.toFixed(2)+'%'}
function fmtCPA(v){if(v==null)return'<span class="nd">&mdash;</span>';return'<span class="'+cpaBadge(v)+'">$'+Math.round(v).toLocaleString('en-US')+'</span>';}
function fmtHook(v,metric){if(v==null)return'<span class="nd">&mdash;</span>';return'<span class="'+hiBadge(v,metric)+'">'+v.toFixed(1)+'%</span>';}
function fmtLink(url){
 if(!url)return'<span class="nd">&mdash;</span>';
 return'<a class="view-link" href="'+url.replace(/\u0026/g,'&')+'" target="_blank" rel="noopener">View <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 1h7v7M11 1L4.5 7.5"/></svg></a>';
}
function buildLegend(){
 const t=TABS[curTab];let h='';
 h+='<div class="legend-item"><span class="dot dot-g"></span>$/App &le; $200</div>';
 h+='<div class="legend-item"><span class="dot dot-y"></span>$/App $200&ndash;250</div>';
 h+='<div class="legend-item"><span class="dot dot-r"></span>$/App &gt; $250</div>';
 if(t.isVideo){
  h+='<div class="legend-item"><span class="dot dot-g"></span>Hook/Hold &ge; 20%</div>';
  h+='<div class="legend-item"><span class="dot dot-y"></span>Hook/Hold 15&ndash;20%</div>';
  h+='<div class="legend-item"><span class="dot dot-r"></span>Hook/Hold &lt; 15%</div>';
 }
 h+='<div class="legend-item"><span class="dot dot-gr"></span>No Data</div>';
 document.getElementById('legend').innerHTML=h;
}
function buildTabs(){
 let h='';
 TABS.forEach((t,i)=>{
  const n=(DATA[t.key]||[]).length;
  h+='<div class="tab'+(i===curTab?' active':'')+'" onclick="switchTab('+i+')">'+t.label+' <span class="cnt">('+n+')</span></div>';
 });
 document.getElementById('tabBar').innerHTML=h;
}
function getCols(){
 const t=TABS[curTab];
 let cols=[
  {key:'idx',label:'#',sortable:false,cls:'col-idx'},
  {key:'name',label:'Name',sortable:true,cls:'col-name'},
  {key:'link',label:'Ad',sortable:false},
  {key:'cost',label:'Spend',sortable:true},
  {key:'apps',label:'Applications',sortable:true},
  {key:'cpa',label:'$/App',sortable:true,badge:'cpa'}
 ];
 if(t.isVideo){
  cols.push({key:'hookRate',label:'Hook %',sortable:true,badge:'hookRate'});
  cols.push({key:'holdRate',label:'Hold %',sortable:true,badge:'holdRate'});
 }
 cols.push(
  {key:'ctrAll',label:'CTR (all)',sortable:true},
  {key:'ctrLink',label:'CTR (link)',sortable:true},
  {key:'cpm',label:'CPM',sortable:true},
  {key:'impressions',label:'Impr',sortable:true},
  {key:'clicks',label:'Clicks',sortable:true},
  {key:'linkClicks',label:'Link Clicks',sortable:true}
 );
 if(t.isVideo)cols.push({key:'thruPlays',label:'ThruPlays',sortable:true});
 return cols;
}
function renderTable(){
 const t=TABS[curTab];
 const cols=getCols();
 const data=(DATA[t.key]||[]).slice();
 const q=document.getElementById('search').value.toLowerCase();
 let filtered=data.filter(r=>{
  if(q&&!r.name.toLowerCase().includes(q))return false;
  if(filters.spend&&(r.cost==null||r.cost<500))return false;
  if(filters.winners&&(r.cpa==null||r.cpa>200))return false;
  return true;
 });
 filtered.sort((a,b)=>{
  let va=a[sortCol],vb=b[sortCol];
  if(va==null&&vb==null)return 0;
  if(va==null)return 1;
  if(vb==null)return -1;
  if(typeof va==='string')return sortAsc?va.localeCompare(vb):vb.localeCompare(va);
  return sortAsc?va-vb:vb-va;
 });
 let th='<tr>';
 cols.forEach(c=>{
  const sorted=c.key===sortCol;
  const arr=sorted?(sortAsc?'&#9650;':'&#9660;'):'&#9650;';
  let cls=(c.cls||'')+(sorted?' sorted':'');
  cls=cls.trim();
  if(c.sortable)th+='<th class="'+cls+'" onclick="doSort(\''+c.key+'\')">'+c.label+'<span class="arr">'+arr+'</span></th>';
  else th+='<th class="'+cls+'">'+c.label+'</th>';
 });
 th+='</tr>';
 document.getElementById('thead').innerHTML=th;
 let tb='';
 filtered.forEach((r,i)=>{
  tb+='<tr>';
  cols.forEach(c=>{
   const cls=c.cls||'';
   if(c.key==='idx'){tb+='<td class="'+cls+'">'+(i+1)+'</td>';return;}
   if(c.key==='name'){tb+='<td class="'+cls+'" title="'+(r.name||'').replace(/"/g,'&quot;')+'">'+(r.name||'')+'</td>';return;}
   if(c.key==='link'){tb+='<td>'+fmtLink(r.link)+'</td>';return;}
   if(c.key==='cost'){tb+='<td>'+fmt$(r[c.key])+'</td>';return;}
   if(c.key==='cpa'){tb+='<td>'+fmtCPA(r.cpa)+'</td>';return;}
   if(c.badge==='hookRate'||c.badge==='holdRate'){tb+='<td>'+fmtHook(r[c.key],c.badge)+'</td>';return;}
   if(c.key==='ctrAll'||c.key==='ctrLink'){tb+='<td>'+fmtP(r[c.key])+'</td>';return;}
   if(c.key==='cpm'){tb+='<td>'+fmtD(r[c.key])+'</td>';return;}
   tb+='<td>'+fmtN(r[c.key])+'</td>';
  });
  tb+='</tr>';
 });
 document.getElementById('tbody').innerHTML=tb;
 document.getElementById('rowCount').textContent=filtered.length+' of '+data.length+' creatives';
}
function switchTab(i){curTab=i;sortCol='cost';sortAsc=false;buildTabs();buildLegend();renderTable();}
function doSort(col){if(sortCol===col)sortAsc=!sortAsc;else{sortCol=col;sortAsc=(col==='name');}renderTable();}
function toggleFilter(f){filters[f]=!filters[f];document.getElementById(f==='winners'?'btnWinners':'btnSpend').classList.toggle('active');renderTable();}
document.getElementById('search').addEventListener('input',renderTable);
buildTabs();buildLegend();renderTable();
</script>

 padding:7px 14px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif}
.awx-close:hover{border-color:#475569;color:#fff}
.awx-sub{font-size:13px;color:#94A3B8;margin-bottom:14px}
.awx-banner{background:#1c1407;border:1px solid #6b4e10;color:#FBBF24;border-radius:8px;
 padding:8px 12px;font-size:12px;margin-bottom:16px;line-height:1.5}
.awx-toggles{display:flex;gap:20px;margin-bottom:16px;flex-wrap:wrap}
.awx-tg{display:flex;gap:7px;align-items:center}
.awx-lbl{font-size:11px;color:#64748B;text-transform:uppercase;letter-spacing:.05em;margin-right:3px}
.awx-btn{padding:6px 14px;background:#151922;border:1px solid #334155;border-radius:8px;
 color:#94A3B8;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif}
.awx-btn:hover{color:#CBD5E1;border-color:#475569}
.awx-btn.on{background:#1D4ED8;color:#fff;border-color:#2563EB}
.awx-legend{font-size:12px;color:#64748B;margin-bottom:14px}
.awx-dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin:0 4px 0 10px;vertical-align:middle}
.awx-g{background:#34D399}.awx-y{background:#FBBF24}.awx-r{background:#F87171}
table.awx-tbl{width:100%;border-collapse:collapse;background:#151922;border-radius:12px;overflow:hidden}
.awx-tbl th{background:#1E293B;color:#CBD5E1;font-size:11px;text-transform:uppercase;
 letter-spacing:.03em;padding:10px 11px;text-align:right;font-weight:600;white-space:nowrap}
.awx-tbl th:first-child{text-align:left}
.awx-tbl td{padding:10px 11px;text-align:right;font-size:13px;border-top:1px solid #1E293B;
 font-family:'JetBrains Mono','DM Sans',monospace;white-space:nowrap}
.awx-tbl td:first-child{text-align:left;font-family:'DM Sans',sans-serif;font-weight:600;color:#F1F5F9}
.awx-tbl tr:hover td{background:#1A1F2B}
.awx-tg-green{color:#34D399}.awx-tg-yellow{color:#FBBF24}.awx-tg-red{color:#F87171}.awx-muted{color:#64748B}
.awx-note{font-size:11px;color:#64748B;margin-top:12px;line-height:1.5}
</style>

 </div>

 <table class="awx-tbl"><thead id="awx-thead"></thead><tbody id="awx-tbody"></tbody></table>

</div></div>
<script>
(function(){
 var P={"name": "Quintessa", "targets": "Cost per Submitted Application \u2264 $200", "cols": [{"label": "Spend", "fmt": "money"}, {"label": "Applications", "fmt": "int"}, {"label": "Cost/App", "fmt": "money", "good": 200, "warn": 250, "higher": false}, {"label": "CTR", "fmt": "pct"}], "orders": {"awareness": ["Problem Aware", "Most Aware", "Solution Aware"], "leadtype": ["Story", "Secret", "Offer", "Problem-Solution", "Proclamation", "Promise"]}, "data": {"awareness": {"All": {"Problem Aware": {"Ads": 159, "Spend": 15438.79, "Applications": 19.0, "Cost/App": 812.5679, "CTR": 0.0095}, "Most Aware": {"Ads": 5, "Spend": 1988.23, "Applications": 4.0, "Cost/App": 497.0575, "CTR": 0.0106}, "Solution Aware": {"Ads": 2, "Spend": 0.0, "Applications": 0.0, "Cost/App": 0.0, "CTR": 0.0}}, "Static": {"Problem Aware": {"Ads": 114, "Spend": 8067.29, "Applications": 10.0, "Cost/App": 806.729, "CTR": 0.0099}, "Most Aware": {"Ads": 4, "Spend": 1988.23, "Applications": 4.0, "Cost/App": 497.0575, "CTR": 0.0106}, "Solution Aware": {"Ads": 2, "Spend": 0.0, "Applications": 0.0, "Cost/App": 0.0, "CTR": 0.0}}, "Video": {"Problem Aware": {"Ads": 45, "Spend": 7371.5, "Applications": 9.0, "Cost/App": 819.0556, "CTR": 0.0087}, "Most Aware": {"Ads": 1, "Spend": 0.0, "Applications": 0.0, "Cost/App": 0.0, "CTR": 0.0}}}, "leadtype": {"All": {"Proclamation": {"Ads": 23, "Spend": 588.1, "Applications": 0.0, "Cost/App": 0.0, "CTR": 0.0079}, "Secret": {"Ads": 26, "Spend": 2402.54, "Applications": 4.0, "Cost/App": 600.635, "CTR": 0.009}, "Problem-Solution": {"Ads": 21, "Spend": 1712.94, "Applications": 5.0, "Cost/App": 342.588, "CTR": 0.0088}, "Story": {"Ads": 89, "Spend": 10663.48, "Applications": 10.0, "Cost/App": 1066.348, "CTR": 0.0098}, "Offer": {"Ads": 5, "Spend": 1988.23, "Applications": 4.0, "Cost/App": 497.0575, "CTR": 0.0106}, "Promise": {"Ads": 2, "Spend": 71.73, "Applications": 0.0, "Cost/App": 0.0, "CTR": 0.0153}}, "Static": {"Proclamation": {"Ads": 11, "Spend": 588.1, "Applications": 0.0, "Cost/App": 0.0, "CTR": 0.0079}, "Secret": {"Ads": 24, "Spend": 2402.54, "Applications": 4.0, "Cost/App": 600.635, "CTR": 0.009}, "Problem-Solution": {"Ads": 18, "Spend": 1712.94, "Applications": 5.0, "Cost/App": 342.588, "CTR": 0.0088}, "Story": {"Ads": 61, "Spend": 3291.98, "Applications": 1.0, "Cost/App": 3291.98, "CTR": 0.0113}, "Offer": {"Ads": 4, "Spend": 1988.23, "Applications": 4.0, "Cost/App": 497.0575, "CTR": 0.0106}, "Promise": {"Ads": 2, "Spend": 71.73, "Applications": 0.0, "Cost/App": 0.0, "CTR": 0.0153}}, "Video": {"Story": {"Ads": 28, "Spend": 7371.5, "Applications": 9.0, "Cost/App": 819.0556, "CTR": 0.0087}, "Proclamation": {"Ads": 12, "Spend": 0.0, "Applications": 0.0, "Cost/App": 0.0, "CTR": 0.0}, "Problem-Solution": {"Ads": 3, "Spend": 0.0, "Applications": 0.0, "Cost/App": 0.0, "CTR": 0.0}, "Secret": {"Ads": 2, "Spend": 0.0, "Applications": 0.0, "Cost/App": 0.0, "CTR": 0.0}, "Offer": {"Ads": 1, "Spend": 0.0, "Applications": 0.0, "Cost/App": 0.0, "CTR": 0.0}}}}, "coverage": {"awareness": {"tagged": 166, "total": 166}, "leadtype": {"tagged": 166, "total": 166}}, "labels": {"awareness": "Awareness Level", "leadtype": "Lead Type"}};
 var dim='awareness',seg='All';
 window.awxOpen=function(){document.getElementById('awx-overlay').classList.add('open');awxRender();};
 window.awxClose=function(){document.getElementById('awx-overlay').classList.remove('open');};
 window.awxSet=function(kind,val,btn){
   if(kind==='dim'){dim=val;document.querySelectorAll('[data-d]').forEach(function(b){b.classList.toggle('on',b===btn);});}
   else{seg=val;document.querySelectorAll('[data-s]').forEach(function(b){b.classList.toggle('on',b===btn);});}
   awxRender();
 };
 function fmt(v,f){
   if(f==='money')return v?'$'+Math.round(v).toLocaleString():'\u2013';
   if(f==='int')return Math.round(v).toLocaleString();
   if(f==='x')return v?v.toFixed(2):'\u2013';
   if(f==='pct')return (v*100).toFixed(2)+'%';
   return v;
 }
 function cls(v,c){
   if(c.good===undefined)return '';
   if(v===0)return 'awx-muted';
   if(c.higher)return v>=c.good?'awx-tg-green':v>=c.warn?'awx-tg-yellow':'awx-tg-red';
   return v<=c.good?'awx-tg-green':v<=c.warn?'awx-tg-yellow':'awx-tg-red';
 }
 function awxRender(){
   document.getElementById('awx-title').textContent=P.name+' \u2014 Awareness & Lead Type';

   var cov=P.coverage[dim];var pct=Math.round(100*cov.tagged/Math.max(cov.total,1));
   var bn=document.getElementById('awx-banner');

   else{bn.style.display='block';bn.innerHTML='Only <b>'+cov.tagged+' of '+cov.total+'</b> ads ('+pct+'%) carry a '+P.labels[dim].toLowerCase()+' tag via CID \u2014 the rest predate the naming switchover and sit in <b>Unclassified</b>, which holds most of the spend. Read the tagged rows as directional until coverage grows.';}

     var tds='<td>'+l+'</td><td>'+r.Ads+'</td>'+cols.map(function(c){
        var v=r[c.label];return '<td class="'+cls(v,c)+'">'+fmt(v,c.fmt)+'</td>';}).join('');
     return '<tr>'+tds+'</tr>';
   }).join('');
   document.getElementById('awx-note').innerHTML='Awareness Level &amp; Lead Type joined from the 2.0 Creative Tracker to the Creative &amp; Copy Tracking Sheet performance tabs on CID. Unclassified = ads with no CID / dimension tag (mostly pre-switchover). All-time figures.';
 }

<script>
/* Add an "Awareness / Lead Type" tab to the dashboard's existing tab bar that
   opens the overlay above.  Renderer-agnostic: clones a sibling tab so styling
   matches, neutralises the original tab behaviour, and re-adds itself if the
   renderer rebuilds the bar. */
(function(){
 function bar(){return document.getElementById('tabBar')||document.querySelector('.tab-bar')
   ||document.querySelector('.tabbar')||document.querySelector('.tabs-bar')||document.querySelector('.tabs')
   ||document.getElementById('tabs')||document.querySelector('[role=tablist]');}
 function add(){
   var b=bar();if(!b)return false;
   if(document.getElementById('awx-tab'))return true;
   var s=b.querySelector('button,a,[data-tab],.tab');
   var t;
   if(s){t=s.cloneNode(true);t.removeAttribute('onclick');t.removeAttribute('href');
     t.setAttribute('data-tab','__awx__');}
   else{t=document.createElement('button');}
   t.id='awx-tab';t.classList.add('awx-tab');
   ['active','on','sel','current','sorted','selected'].forEach(function(c){t.classList.remove(c);});
   t.textContent='▦ Awareness / Lead Type';
   t.addEventListener('click',function(e){e.preventDefault();e.stopImmediatePropagation();
     if(window.awxOpen)awxOpen();},true);
   b.appendChild(t);return true;
 }
 var n=0,iv=setInterval(function(){n++;if(add()||n>60)clearInterval(iv);},120);
 if(window.MutationObserver){
   var mo=new MutationObserver(function(){if(!document.getElementById('awx-tab'))add();});
   document.addEventListener('DOMContentLoaded',function(){var b=bar();
     if(b&&b.parentNode)mo.observe(b.parentNode,{childList:true,subtree:true});});
 }
 document.addEventListener('DOMContentLoaded',add);
})();
</script>
